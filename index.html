<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hmmmmmm!!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "72", "Segoe UI", Arial, sans-serif; /* Standard Fiori font stack */
      background: #f5f6f7;
      color: #32363a;
    }

    /* HEADER (Fiori style) */
    .header {
      height: 48px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid #d9d9d9;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #1d2d3e;
      padding: 4px;
    }

    .back:hover {
      background: #f0f0f0;
      border-radius: 4px;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 22px;
    }

    .dropdown {
      border: 1px solid #0056b3;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      background: white;
      color: #0056b3;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dropdown:hover {
      background: #e5f0fa;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 20px;
      color: #1d2d3e;
    }

    .icon {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      stroke: #1d2d3e;
    }

    .avatar {
      width: 32px;
      height: 32px;
      background: #d1e8ff;
      color: #0056b3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    /* MAIN CONTENT */
    .content {
      height: calc(100vh - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 420px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .title {
      font-size: 30px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .status {
      font-size: 14px;
      color: #6a6d70;
      margin-bottom: 16px;
    }

    /* Busy indicator (SAP-like) */
    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #cfe8ff;
      border-top: 3px solid #0a6ed1;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      font-size: 17px;
      color: #515559;
      min-height: 22px;
      transition: opacity 0.3s;
    }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="left">
      <div class="back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </div>
      <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/SAP_2011_logo.svg" alt="SAP Logo">
      </div>
      <div class="dropdown">
        Sarcasm 
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </div>

    <div class="right">
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </div>
      <div class="avatar">SR</div>
    </div>
  </div>

  <div class="content">
    <div class="card">
      <div class="title">I'm waiting for a response 🙃</div>
      <div class="status">Status: In Progress</div>

      <div class="spinner"></div>

      <div class="message" id="msg"></div>

      <div class="footer">Last updated: Just now</div>
    </div>
  </div>

  <script src="messages.js"></script>

  <script>
    // Fallback array if messages.js is missing
 window.SAP_MESSAGES = window.SAP_MESSAGES || [
"No rush. I cleared my entire schedule for this.",
"Take your time. Really. I insist.",
"I'm starting to feel like this is a personality trait now.",
"At this point, it's more of a lifestyle.",
"Legend says the account is still being created.",
"Should I send a reminder... or a search party?",
"Should I raise another ticket or just age gracefully?",
"Somewhere, someone said 'I'll check'.",
"Still waiting. No updates. Strong consistency."
 ];

    let index = 0;
    const el = document.getElementById("msg");

    function rotate() {
      el.style.opacity = 0;
      setTimeout(() => {
        el.textContent = window.SAP_MESSAGES[index];
        el.style.opacity = 1;
        index = (index + 1) % window.SAP_MESSAGES.length;
      }, 200);
    }

    rotate();
    setInterval(rotate, 3000);
  </script>

</body>
</html>
