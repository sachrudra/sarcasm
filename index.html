<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Still Waiting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
      color: #333;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .subtext {
      font-size: 1.1rem;
      color: #666;
      min-height: 24px;
      transition: opacity 0.4s ease;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 15px;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .dots span {
      animation: blink 1.4s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="emoji">🙃</div>
    <h1>I'm still waiting for that account<span class="dots">...</span></h1>
    <div class="subtext" id="sarcasm"></div>
  </div>

  <script>
    const messages = [
      "No rush. I cleared my entire schedule for this.",
      "Take your time. Really. I insist.",
      "I'm starting to feel like this is a personality trait now.",
      "At this point, it's more of a lifestyle.",
      "Legend says the account is still being created.",
      "Should I send a reminder... or a search party?"
    ];

    let index = 0;
    const el = document.getElementById("sarcasm");

    function rotateText() {
      el.style.opacity = 0;
      setTimeout(() => {
        el.textContent = messages[index];
        el.style.opacity = 1;
        index = (index + 1) % messages.length;
      }, 300);
    }

    rotateText();
    setInterval(rotateText, 2500);
  </script>
</body>
</html>
